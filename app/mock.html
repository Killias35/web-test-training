<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Shop - Utilisateurs</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header>
  <h1>Mini Shop</h1>
  <nav>
    <a href="index.html">accueil</a>
    <a href="login.html">Login</a>
    <a href="products.html">Produits</a>
    <a href="mock.html">Mock</a>
  </nav>
</header>

<div class="container">
  <h2>Liste des utilisateurs</h2>
  <p>Chargement des données depuis une API publique.</p>

  <button id="loadUsersBtn">Charger les utilisateurs</button>

  <div id="loading" style="display: none;">
    <p>Chargement en cours...</p>
  </div>

  <div id="error" style="display: none; color: red;">
    <p>Erreur lors du chargement des données.</p>
  </div>

  <ul id="userList"></ul>
</div>

<script>
  const loadUsersBtn = document.getElementById('loadUsersBtn');
  const userList = document.getElementById('userList');
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');

  async function fetchUsers() {
    loading.style.display = 'block';
    error.style.display = 'none';
    userList.innerHTML = '';

    try {
      const response = await fetch('https://jsonplaceholder.typicode.com/users');

      if (!response.ok) {
        throw new Error('Erreur API');
      }

      const users = await response.json();

      users.forEach(user => {
        const li = document.createElement('li');
        li.innerHTML = `
          <strong>${user.name}</strong><br>
          Email: ${user.email}<br>
          Ville: ${user.address.city}
        `;
        userList.appendChild(li);
      });

    } catch (err) {
      error.style.display = 'block';
    } finally {
      loading.style.display = 'none';
    }
  }

  loadUsersBtn.addEventListener('click', fetchUsers);
</script>

</body>
</html>
